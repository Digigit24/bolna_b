version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bolna_hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------------------------------------
  # Redis — Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Django web server
  # ---------------------------------------------------------------------------
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn bolna_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  # ---------------------------------------------------------------------------
  # Celery worker — processes async tasks (calls, transcripts, AI summaries)
  # ---------------------------------------------------------------------------
  celery_worker:
    build: .
    command: celery -A bolna_backend worker -l info --concurrency=4
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler (optional, for future cron jobs)
  # ---------------------------------------------------------------------------
  celery_beat:
    build: .
    command: celery -A bolna_backend beat -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible storage for recordings and transcripts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
